<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CCGL Cultivation Schedule</title>
<style>
:root{
  --bg:#0a1628; --bg-deep:#050d16; --panel:#0f1f35; --panel-2:#13263f; --panel-3:#0d1b2c;
  --line:#1a3050; --line-soft:#1a305066;
  --text:#d0d8e0; --text-bright:#d6e4f1; --text-dim:#8096ab; --text-faint:#5a7088;
  --teal:#4E9E8E; --green:#8DC63F; --blue:#4A90B5; --purple:#9b59b6;
  --red:#e74c3c; --orange:#f39c12; --ok:#2ecc71; --pink:#e84393; --cyan:#00cec9; --sand:#f0d5a5;
  --rF1:#4E9E8E; --rF2:#4A90B5; --rF3:#9b59b6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;background:var(--panel-3);border:1px solid var(--line);color:var(--text-bright);border-radius:6px;padding:7px 10px;font-size:13px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal)}
input[type=date]{color-scheme:dark}
a{color:var(--teal)}

/* ---------- login ---------- */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 30%,#0f2137 0%,var(--bg-deep) 70%)}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:36px 40px;width:340px;box-shadow:0 20px 60px #00000066}
.login-card h1{font-size:19px;color:var(--text-bright);margin-bottom:2px}
.login-card .sub{color:var(--text-dim);font-size:12px;margin-bottom:22px}
.login-card label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin:14px 0 5px}
.login-card select,.login-card input{width:100%}
.login-card .go{width:100%;margin-top:22px;background:var(--teal);border:none;color:#04110e;font-weight:700;padding:10px;border-radius:8px;font-size:14px}
.login-err{color:var(--red);font-size:12px;margin-top:10px;min-height:15px}
.leaf{font-size:26px;margin-bottom:10px}

/* ---------- layout ---------- */
.app{display:none;min-height:100vh}
.app.on{display:flex}
.sidebar{width:210px;flex-shrink:0;background:linear-gradient(180deg,#081520 0%,#050d16 100%);border-right:1px solid var(--line);padding:18px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:0 18px 16px;border-bottom:1px solid var(--line-soft);margin-bottom:12px}
.brand .t1{font-weight:800;color:var(--text-bright);font-size:15px;letter-spacing:.02em}
.brand .t2{color:var(--teal);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.nav{flex:1}
.nav a{display:flex;align-items:center;gap:9px;padding:9px 18px;color:var(--text-dim);text-decoration:none;font-size:13px;border-left:3px solid transparent}
.nav a:hover{color:var(--text-bright);background:#4E9E8E11}
.nav a.active{color:var(--text-bright);border-left-color:var(--teal);background:linear-gradient(90deg,#4E9E8E1a 0%,transparent 100%)}
.nav .cnt{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px}
.nav .cnt.zero{background:var(--line);color:var(--text-dim)}
.side-foot{padding:12px 18px;border-top:1px solid var(--line-soft);font-size:11px;color:var(--text-faint)}
.side-foot .who{color:var(--text-dim);font-weight:600}
.side-foot button{background:none;border:none;color:var(--text-faint);font-size:11px;padding:0;margin-top:4px;text-decoration:underline}
.main{flex:1;min-width:0;padding:22px 26px 60px}

.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.pagehead h2{font-size:18px;color:var(--text-bright)}
.pagehead .sub{color:var(--text-dim);font-size:12px;margin-top:3px}
.hd-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.btn{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:7px 13px;font-size:13px}
.btn:hover{border-color:var(--teal);color:var(--text-bright)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#04110e;font-weight:700}
.btn.danger{border-color:#e74c3c55;color:var(--red)}
.btn.small{padding:4px 9px;font-size:12px;border-radius:6px}
.btn:disabled{opacity:.45;cursor:not-allowed}

.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:20px;padding:2px 9px}
.badge.crit{background:#e74c3c22;color:var(--red);border:1px solid #e74c3c33}
.badge.warn{background:#f39c1222;color:var(--orange);border:1px solid #f39c1233}
.badge.info{background:#4A90B522;color:var(--blue);border:1px solid #4A90B533}
.badge.ok{background:#2ecc7122;color:var(--ok)}
.badge.dim{background:var(--line-soft);color:var(--text-dim)}
.badge.est{background:#f0d5a522;color:var(--sand)}

.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
.card h3{font-size:13px;color:var(--text-bright);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.muted{color:var(--text-dim)} .faint{color:var(--text-faint)} .small{font-size:12px}
.mono{font-variant-numeric:tabular-nums}

/* ---------- timeline ---------- */
.tl-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.tl-controls .zoom{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.tl-controls .zoom button{background:var(--panel-3);border:none;color:var(--text-dim);padding:6px 12px;font-size:12px}
.tl-controls .zoom button.on{background:var(--teal);color:#04110e;font-weight:700}
.tl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.tl-scroll{overflow-x:auto;position:relative}
.tl-inner{position:relative}
.tl-months{position:relative;height:22px;border-bottom:1px solid var(--line)}
.tl-months .m{position:absolute;top:0;height:100%;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:var(--text-dim);border-left:1px solid var(--line-soft);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;overflow:hidden}
.tl-days{position:relative;height:20px;border-bottom:1px solid var(--line)}
.tl-days .d{position:absolute;top:0;height:100%;font-size:9px;color:var(--text-faint);display:flex;align-items:center;justify-content:center}
.tl-days .d.we{color:#f39c1288}
.tl-lane{position:relative;border-bottom:1px solid var(--line-soft)}
.tl-lane:last-child{border-bottom:none}
.tl-lane-label{position:sticky;left:0;z-index:5;width:130px;height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 10px;background:linear-gradient(90deg,#0f1f35 82%,transparent);pointer-events:none}
.tl-lane-label .nm{font-size:12px;font-weight:700;color:var(--text-bright)}
.tl-lane-label .ds{font-size:10px;color:var(--text-faint)}
.tl-grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--line-soft)}
.tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--green);z-index:4;box-shadow:0 0 8px #8DC63F88}
.tl-today-tag{position:absolute;top:1px;background:var(--green);color:#04110e;font-size:9px;font-weight:800;padding:1px 5px;border-radius:0 4px 4px 0;z-index:4}
.tl-bar{position:absolute;border-radius:4px;font-size:10px;font-weight:600;color:#fff;display:flex;align-items:center;padding:0 6px;overflow:hidden;white-space:nowrap;cursor:pointer;border:1px solid #00000033}
.tl-bar .lbl{text-shadow:0 1px 2px #00000088}
.tl-mark{position:absolute;border-radius:3px;cursor:pointer;z-index:3;border:1px solid #00000044;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;overflow:hidden;text-shadow:0 1px 2px #000000aa}
.tl-flag{position:absolute;z-index:6;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);cursor:pointer}
.tl-flag.crit{background:var(--red)} .tl-flag.warn{background:var(--orange)} .tl-flag.info{background:var(--blue)}
.tl-legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 14px;border-top:1px solid var(--line);font-size:11px;color:var(--text-dim)}
.tl-legend .k{display:flex;align-items:center;gap:5px}
.tl-legend .sw{width:14px;height:9px;border-radius:2px;display:inline-block}
.tip{position:fixed;z-index:99;background:#050d16f2;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12px;max-width:300px;pointer-events:none;box-shadow:0 8px 30px #000000aa;display:none}
.tip .t{font-weight:700;color:var(--text-bright);margin-bottom:3px}

/* ---------- conflicts ---------- */
.cf-row{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
.cf-row:last-child{border-bottom:none}
.cf-row .ic{font-size:16px;line-height:1.2}
.cf-row .tt{font-weight:600;color:var(--text-bright);font-size:13px}
.cf-row .dd{color:var(--text-dim);font-size:12px;margin-top:2px}
.cf-row .dt{margin-left:auto;text-align:right;color:var(--text-faint);font-size:11px;white-space:nowrap}

/* ---------- cycles ---------- */
.cy-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.cy-card .top{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.cy-card .code{font-weight:800;font-size:15px;color:var(--text-bright)}
.cy-card .roomtag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#04110e}
.cy-phase{font-size:12px;color:var(--text-dim);margin-bottom:10px}
.cy-phase b{color:var(--text-bright)}
.cy-dates{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;font-size:12px}
.cy-dates .k{color:var(--text-faint)} .cy-dates .v{color:var(--text);text-align:right}
.cy-foot{display:flex;gap:8px;margin-top:12px}
.prog{height:5px;background:var(--panel-3);border-radius:3px;overflow:hidden;margin:8px 0 4px}
.prog i{display:block;height:100%;border-radius:3px}

/* ---------- forms / modal ---------- */
.modal-bg{position:fixed;inset:0;background:#050d16cc;z-index:50;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;width:100%;max-width:560px;box-shadow:0 20px 80px #000000cc}
.modal h3{font-size:15px;color:var(--text-bright);margin-bottom:16px}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frm .full{grid-column:1/-1}
.frm label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:4px}
.frm input,.frm select,.frm textarea{width:100%}
.frm .hint{font-size:11px;color:var(--text-faint);margin-top:3px}
.modal .acts{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* ---------- tables ---------- */
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);padding:7px 10px;border-bottom:1px solid var(--line)}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--line-soft);color:var(--text)}
.tbl tr:hover td{background:#4E9E8E08}
.tbl td input,.tbl td select{padding:4px 7px;font-size:12px}

/* ---------- clone orders ---------- */
.co-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.co-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
.co-head:hover{background:#4E9E8E08}
.co-head .arrow{color:var(--text-faint);font-size:11px;width:12px}
.co-head .ttl{font-weight:700;color:var(--text-bright)}
.co-head .meta{color:var(--text-dim);font-size:12px}
.co-body{border-top:1px solid var(--line);padding:14px 16px;display:none}
.co-card.open .co-body{display:block}
.co-stats{display:flex;gap:22px;margin-bottom:12px;font-size:12px;color:var(--text-dim);flex-wrap:wrap}
.co-stats b{color:var(--text-bright);font-size:15px;display:block}

/* ---------- settings ---------- */
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.set-item label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px}
.set-item input{width:100%}

.toast{position:fixed;bottom:20px;right:20px;background:var(--panel-2);border:1px solid var(--teal);color:var(--text-bright);border-radius:8px;padding:11px 16px;font-size:13px;z-index:100;display:none;box-shadow:0 10px 40px #000000aa}
.pill-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.empty{padding:30px;text-align:center;color:var(--text-faint);font-size:13px}
.notice{background:#4A90B511;border:1px solid #4A90B533;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text-dim);margin-bottom:14px}
.notice b{color:var(--blue)}

@media(max-width:900px){
  .sidebar{width:64px}
  .brand .t1,.brand .t2,.nav a span.txt,.side-foot{display:none}
  .nav a{justify-content:center;padding:11px 0}
  .main{padding:16px 12px 60px}
  .grid2{grid-template-columns:1fr}
  .frm{grid-template-columns:1fr}
}

</style>
</head>

/* ===================== date helpers ===================== */
const MS=86400000;
function pd(iso){ if(!iso) return null; const [y,m,d]=iso.split('-').map(Number); return Date.UTC(y,m-1,d); }
function iso(t){ const d=new Date(t); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function addISO(isoStr,days){ return iso(pd(isoStr)+days*MS); }
function diffDays(a,b){ return Math.round((pd(b)-pd(a))/MS); } // b - a
function dow(isoStr){ return new Date(pd(isoStr)).getUTCDay(); } // 0 Sun
function isWeekend(isoStr){ const d=dow(isoStr); return d===0||d===6; }
function fmt(isoStr,withYear){ if(!isoStr) return '—'; const d=new Date(pd(isoStr)); const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return M[d.getUTCMonth()]+' '+d.getUTCDate()+(withYear?' \''+String(d.getUTCFullYear()).slice(2):''); }
function fmtR(isoStr){ return fmt(isoStr,true); }
function todayISO(){ const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'); }
function overlap(a,b){ return a&&b&&a.start<=b.end&&b.start<=a.end; }
function within(d,seg){ return seg&&d>=seg.start&&d<=seg.end; }
function gapDays(a,b){ // days between segments (0 = touching/overlap)
  if(overlap(a,b)) return 0;
  return a.end<b.start ? diffDays(a.end,b.start)-1 : diffDays(b.end,a.start)-1;
}

/* ===================== cycle derivation =====================
   Inputs (cycle.dates): cloneCut, transplantRack, transplantRoom, flowerDay1
   Everything else derived from config defaults, overridable per-cycle. */
function deriveCycle(cy,cfg){
  const D=cfg.defaults, o=cy.overrides||{}, dt=cy.dates||{};
  const ev={};
  const f1=dt.flowerDay1;
  if(dt.cloneCut){
    const end = dt.transplantRack? addISO(dt.transplantRack,-1) : addISO(dt.cloneCut,(D.cutToRackDays||21)-1);
    ev.clone={start:dt.cloneCut,end,kind:'clone'};
  }
  if(dt.transplantRack){
    const end = dt.transplantRoom? addISO(dt.transplantRoom,-1) : addISO(dt.transplantRack,(D.rackToRoomDays||10)-1);
    ev.rack={start:dt.transplantRack,end,kind:'rack'};
  }
  if(dt.transplantRoom && f1 && diffDays(dt.transplantRoom,f1)>0){
    ev.roomVeg={start:dt.transplantRoom,end:addISO(f1,-1),kind:'roomVeg'};
  }
  if(f1){
    const fEnd=addISO(f1,D.flowerDays-1);
    const hStart = o.harvestStart || addISO(f1,D.harvestPlanDay-1);
    const hEnd   = o.harvestEnd   || addISO(hStart,D.dryHarvestDays-1);
    const ffDays = D.ffHarvestDays||2;
    const ffStart= o.ffHarvestStart || addISO(hStart,-ffDays);
    ev.flower ={start:f1,end:(hEnd>fEnd?hEnd:fEnd),kind:'flower'};
    ev.window ={start:addISO(f1,D.harvestWindowStart-1),end:addISO(f1,D.flowerDays-1),kind:'window'};
    const d1=o.defole1Start||addISO(f1,D.defole1Day-1);
    const d2=o.defole2Start||addISO(f1,D.defole2Day-1);
    ev.defole1={start:d1,end:o.defole1End||addISO(d1,D.defoleLen-1),kind:'defole',n:1};
    ev.defole2={start:d2,end:o.defole2End||addISO(d2,D.defoleLen-1),kind:'defole',n:2};
    ev.ff     ={start:ffStart,end:addISO(hStart,-1),kind:'ff'};
    ev.harvest={start:hStart,end:hEnd,kind:'harvest'};
    const flS=o.flipStart||addISO(hEnd,1);
    ev.flip   ={start:flS,end:o.flipEnd||addISO(flS,D.flipDays-1),kind:'flip'};
    const hgS=o.dryHangStart||hStart;
    const hgE=o.dryHangEnd||addISO(hgS,D.dryHangDays-1);
    ev.hang   ={start:hgS,end:hgE,kind:'hang'};
    ev.bins   ={start:addISO(hgE,1),end:o.dryBinsEnd||addISO(hgE,D.dryBinDays),kind:'bins'};
    ev.flowerDayOf=(d)=>diffDays(f1,d)+1;
  }
  return ev;
}

function cycleStatus(cy,ev){
  const t=todayISO();
  if(ev.bins&&t>ev.bins.end) return {label:'Complete',color:'var(--text-faint)',phase:'done'};
  if(ev.bins&&within(t,ev.bins)) return {label:'Dry — in bins · day '+(diffDays(ev.bins.start,t)+1),color:'var(--sand)',phase:'bins'};
  if(ev.hang&&within(t,ev.hang)) return {label:'Dry — hanging · day '+(diffDays(ev.hang.start,t)+1),color:'var(--sand)',phase:'hang'};
  if(ev.harvest&&within(t,ev.harvest)) return {label:'HARVEST',color:'var(--red)',phase:'harvest'};
  if(ev.ff&&within(t,ev.ff)) return {label:'FF Harvest',color:'var(--pink)',phase:'ff'};
  if(ev.flower&&within(t,ev.flower)) return {label:'Flower day '+(ev.flowerDayOf(t)),color:'var(--teal)',phase:'flower'};
  if(ev.roomVeg&&within(t,ev.roomVeg)) return {label:'Veg in room · day '+(diffDays(ev.roomVeg.start,t)+1),color:'var(--green)',phase:'roomVeg'};
  if(ev.rack&&within(t,ev.rack)) return {label:'Veg on rack · day '+(diffDays(ev.rack.start,t)+1),color:'var(--green)',phase:'rack'};
  if(ev.clone&&within(t,ev.clone)) return {label:'Clone · day '+(diffDays(ev.clone.start,t)+1),color:'var(--cyan)',phase:'clone'};
  if(ev.clone&&t<ev.clone.start) return {label:'Planned · cut '+fmt(ev.clone.start),color:'var(--text-dim)',phase:'planned'};
  return {label:'Planned',color:'var(--text-dim)',phase:'planned'};
}

/* ===================== conflict detection ===================== */
function detectConflicts(state){
  const cfg=state.config, D=cfg.defaults;
  const list=[];
  const cys=state.cycles.filter(c=>!c.archived).map(c=>({cy:c,ev:deriveCycle(c,cfg)}));
  const prox=D.harvestProximityDays||2;
  const roomName=id=>{const r=cfg.rooms.find(r=>r.id===id);return r?r.name:id;};
  const push=(sev,date,title,detail,ids)=>list.push({sev,date,title,detail,cycles:ids});

  for(let i=0;i<cys.length;i++)for(let j=i+1;j<cys.length;j++){
    const A=cys[i],B=cys[j];
    // harvest blocks = FF start -> dry harvest end
    const hA=A.ev.harvest?{start:(A.ev.ff?A.ev.ff.start:A.ev.harvest.start),end:A.ev.harvest.end}:null;
    const hB=B.ev.harvest?{start:(B.ev.ff?B.ev.ff.start:B.ev.harvest.start),end:B.ev.harvest.end}:null;
    if(hA&&hB&&A.cy.room!==B.cy.room){
      if(overlap(hA,hB)) push('crit',hA.start>hB.start?hA.start:hB.start,'Harvests overlap: '+A.cy.id+' + '+B.cy.id,'Both rooms are in their FF/dry harvest block at the same time.',[A.cy.id,B.cy.id]);
      else if(gapDays(hA,hB)<=prox) push('warn',hA.start>hB.start?hA.start:hB.start,'Harvests back-to-back: '+A.cy.id+' + '+B.cy.id,'Only '+gapDays(hA,hB)+' day(s) between the two harvest blocks (threshold '+prox+').',[A.cy.id,B.cy.id]);
    }
    // defole vs other room's harvest block
    [[A,B],[B,A]].forEach(([X,Y])=>{
      const hY=Y.ev.harvest?{start:(Y.ev.ff?Y.ev.ff.start:Y.ev.harvest.start),end:Y.ev.harvest.end}:null;
      if(!hY) return;
      ['defole1','defole2'].forEach(k=>{
        if(X.ev[k]&&overlap(X.ev[k],hY)) push('warn',X.ev[k].start,'Defole during harvest: '+X.cy.id+' × '+Y.cy.id,X.cy.id+' defole '+X.ev[k].n+' ('+fmt(X.ev[k].start)+'–'+fmt(X.ev[k].end)+') lands inside '+Y.cy.id+"'s harvest block.",[X.cy.id,Y.cy.id]);
      });
      // clone cut in harvest block
      if(X.ev.clone){
        const cut={start:X.ev.clone.start,end:X.ev.clone.start};
        if(overlap(cut,hY)) push('warn',cut.start,'Clone cut during harvest: '+X.cy.id+' × '+Y.cy.id,'Clone cut for '+X.cy.id+' ('+fmt(cut.start)+') falls inside '+Y.cy.id+"'s harvest block.",[X.cy.id,Y.cy.id]);
      }
      // transplant during other room's harvest or flip
      ['transplantRack','transplantRoom'].forEach(tk=>{
        const d=X.cy.dates&&X.cy.dates[tk]; if(!d) return;
        if(within(d,hY)) push('info',d,'Transplant during harvest: '+X.cy.id+' × '+Y.cy.id,(tk==='transplantRack'?'Transplant to rack':'Transplant to room')+' for '+X.cy.id+' ('+fmt(d)+') is inside '+Y.cy.id+"'s harvest block.",[X.cy.id,Y.cy.id]);
        if(Y.ev.flip&&within(d,Y.ev.flip)) push('info',d,'Transplant during flip: '+X.cy.id+' × '+Y.cy.id,(tk==='transplantRack'?'Rack':'Room')+' transplant for '+X.cy.id+' while '+roomName(Y.cy.room)+' is mid room-flip.',[X.cy.id,Y.cy.id]);
      });
    });
    // dry room
    if(A.ev.hang&&B.ev.hang){
      if(overlap(A.ev.hang,B.ev.hang)) push('crit',A.ev.hang.start>B.ev.hang.start?A.ev.hang.start:B.ev.hang.start,'Dry room double-hung: '+A.cy.id+' + '+B.cy.id,'Two harvests hanging at once — one dry room can’t take both.',[A.cy.id,B.cy.id]);
      else{
        const [first,second]=A.ev.hang.start<=B.ev.hang.start?[A,B]:[B,A];
        if(first.ev.bins&&overlap(first.ev.bins,second.ev.hang)) push('warn',second.ev.hang.start,'Bins must move early: '+first.cy.id+' → '+second.cy.id,first.cy.id+"'s bins are scheduled in the dry room until "+fmt(first.ev.bins.end)+', but '+second.cy.id+' starts hanging '+fmt(second.ev.hang.start)+'. Bins need to move to cure/production '+(diffDays(second.ev.hang.start,first.ev.bins.end)+1)+' day(s) sooner.',[first.cy.id,second.cy.id]);
      }
    }
    // veg rack occupancy
    if(A.ev.rack&&B.ev.rack&&overlap(A.ev.rack,B.ev.rack))
      push('warn',A.ev.rack.start>B.ev.rack.start?A.ev.rack.start:B.ev.rack.start,'Veg rack double-booked: '+A.cy.id+' + '+B.cy.id,'Both cycles are on the veg rack '+fmt(A.ev.rack.start>B.ev.rack.start?A.ev.rack.start:B.ev.rack.start)+'–'+fmt(A.ev.rack.end<B.ev.rack.end?A.ev.rack.end:B.ev.rack.end)+'. Check rack capacity.',[A.cy.id,B.cy.id]);
    // same-room sanity: overlapping occupancy
    if(A.cy.room===B.cy.room&&A.ev.flower&&B.ev.flower){
      const occA={start:(A.cy.dates.transplantRoom||A.ev.flower.start),end:A.ev.flip?A.ev.flip.end:A.ev.flower.end};
      const occB={start:(B.cy.dates.transplantRoom||B.ev.flower.start),end:B.ev.flip?B.ev.flip.end:B.ev.flower.end};
      if(overlap(occA,occB)) push('crit',occB.start>occA.start?occB.start:occA.start,'Room double-booked: '+A.cy.id+' + '+B.cy.id,roomName(A.cy.room)+' has two cycles occupying it at once (incl. flip days).',[A.cy.id,B.cy.id]);
    }
  }
  // weekend / holiday landings + room-dark gaps
  const hol={}; (cfg.holidays||[]).forEach(h=>hol[h.date]=h.name);
  cys.forEach(({cy,ev})=>{
    const checks=[
      ['Clone cut',cy.dates.cloneCut],['Transplant to rack',cy.dates.transplantRack],
      ['Transplant to room',cy.dates.transplantRoom],
      ['FF harvest start',ev.ff&&ev.ff.start],['Harvest start',ev.harvest&&ev.harvest.start],
      ['Defole 1 start',ev.defole1&&ev.defole1.start],['Defole 2 start',ev.defole2&&ev.defole2.start]
    ];
    checks.forEach(([nm,d])=>{
      if(!d||d<todayISO()) return;
      if(hol[d]) push('warn',d,nm+' on '+hol[d],cy.id+': '+nm+' lands on '+hol[d]+' ('+fmt(d)+').',[cy.id]);
      else if(isWeekend(d)) push('info',d,nm+' on a weekend',cy.id+': '+nm+' lands on a '+(dow(d)===0?'Sunday':'Saturday')+' ('+fmt(d)+').',[cy.id]);
    });
    if(ev.harvest){
      ['harvest','ff'].forEach(k=>{ if(!ev[k])return; for(let d=ev[k].start;d<=ev[k].end;d=addISO(d,1)){ if(hol[d]&&d>=todayISO()) push('warn',d,(k==='ff'?'FF harvest':'Harvest')+' day on '+hol[d],cy.id+' '+(k==='ff'?'FF harvest':'harvest')+' runs over '+hol[d]+' ('+fmt(d)+').',[cy.id]); } });
    }
  });
  // room dark gaps
  cfg.rooms.filter(r=>r.active).forEach(r=>{
    const rc=cys.filter(c=>c.cy.room===r.id&&c.ev.flip&&c.cy.dates.transplantRoom).sort((a,b)=>a.cy.dates.transplantRoom<b.cy.dates.transplantRoom?-1:1);
    for(let i=0;i<rc.length-1;i++){
      const gap=diffDays(rc[i].ev.flip.end,rc[i+1].cy.dates.transplantRoom)-1;
      if(gap>3) push('info',rc[i].ev.flip.end,r.name+' dark for '+gap+' days','Between '+rc[i].cy.id+' flip end ('+fmt(rc[i].ev.flip.end)+') and '+rc[i+1].cy.id+' transplant ('+fmt(rc[i+1].cy.dates.transplantRoom)+').',[rc[i].cy.id,rc[i+1].cy.id]);
    }
  });
  list.sort((a,b)=>(a.date<b.date?-1:1));
  const rank={crit:0,warn:1,info:2};
  return list;
}

/* ===================== app core: state, auth, router, publish ===================== */
let S=null;           // live state
let USER=null;        // {name,role}
let DIRTY=false;
let VIEW='timeline';
let TL_ZOOM=6;        // px per day
let TL_HISTORY=false;

const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const isAdmin=()=>USER&&USER.role==='admin';
const LS_DRAFT='ccgl_cult_draft_v1', LS_TOKEN='ccgl_cult_gh_token', SS_USER='ccgl_cult_user';

async function boot(){
  let remote=null;
  try{ const r=await fetch('state.json?ts='+Date.now(),{cache:'no-store'}); if(r.ok) remote=await r.json(); }catch(e){}
  S = remote || JSON.parse(JSON.stringify(DEFAULT_STATE));
  const draft=localStorage.getItem(LS_DRAFT);
  if(draft){ try{ const d=JSON.parse(draft); if(!remote || (d.meta&&remote.meta&&d.meta.updatedAt>=remote.meta.updatedAt)){ S=d; DIRTY=true; } }catch(e){} }
  const saved=sessionStorage.getItem(SS_USER);
  if(saved){ try{ USER=JSON.parse(saved); }catch(e){} }
  if(USER) enterApp(); else showLogin();
}

function showLogin(){
  $('#login').style.display='flex'; $('#app').classList.remove('on');
  const sel=$('#login-name'); sel.innerHTML=S.config.users.map(u=>`<option>${esc(u.name)}</option>`).join('');
}
function doLogin(){
  const name=$('#login-name').value, pw=$('#login-pw').value;
  const u=S.config.users.find(u=>u.name===name&&u.pw===pw);
  if(!u){ $('#login-err').textContent='Wrong password.'; return; }
  USER={name:u.name,role:u.role};
  sessionStorage.setItem(SS_USER,JSON.stringify(USER));
  enterApp();
}
function logout(){ sessionStorage.removeItem(SS_USER); location.reload(); }

function enterApp(){
  $('#login').style.display='none'; $('#app').classList.add('on');
  $('#who').textContent=USER.name+' · '+(isAdmin()?'editor':'view only');
  if(!isAdmin()) $$('.nav a').forEach(a=>{ if(a.dataset.v==='planner'||a.dataset.v==='settings') a.style.display='none'; });
  nav(VIEW);
}

function markDirty(){
  DIRTY=true;
  S.meta.updatedAt=todayISO(); S.meta.updatedBy=USER?USER.name:'?';
  localStorage.setItem(LS_DRAFT,JSON.stringify(S));
  updateDirtyUI();
}
function updateDirtyUI(){
  $('#pub-hint').style.display=DIRTY?'inline':'none';
}
function toast(msg,ms){ const t=$('#toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._x); t._x=setTimeout(()=>t.style.display='none',ms||2600); }

/* ---------- publish to GitHub ---------- */
async function publish(){
  if(!isAdmin()) return;
  const P=S.config.publish;
  let tok=localStorage.getItem(LS_TOKEN);
  if(!tok){ tok=prompt('Paste the GitHub personal access token (stored only in this browser):'); if(!tok) return; localStorage.setItem(LS_TOKEN,tok.trim()); }
  const api=`https://api.github.com/repos/${P.owner}/${P.repo}/contents/${P.path}`;
  toast('Publishing…',8000);
  try{
    let sha;
    const g=await fetch(api+'?ref='+P.branch,{headers:{Authorization:'Bearer '+tok}});
    if(g.ok){ sha=(await g.json()).sha; }
    const body={message:'Update schedule — '+USER.name+' '+new Date().toLocaleString(),branch:P.branch,content:btoa(unescape(encodeURIComponent(JSON.stringify(S,null,2))))};
    if(sha) body.sha=sha;
    const r=await fetch(api,{method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.message||r.status); }
    DIRTY=false; localStorage.removeItem(LS_DRAFT); updateDirtyUI();
    toast('Published ✓ — live in ~30s');
  }catch(e){
    if(String(e.message).match(/credentials|401/i)) localStorage.removeItem(LS_TOKEN);
    toast('Publish failed: '+e.message,6000);
  }
}

/* ---------- shared helpers ---------- */
function roomOf(id){ return S.config.rooms.find(r=>r.id===id)||{id,name:id,color:'#888'}; }
function cycleById(id){ return S.cycles.find(c=>c.id===id) || ((S.mock&&S.mock.cycles)||[]).find(c=>c.id===id); }
function nextCode(roomId){
  let mx=0;
  S.cycles.filter(c=>c.room===roomId).forEach(c=>{ const m=c.id.match(/H(\d+)/); if(m) mx=Math.max(mx,+m[1]); });
  return roomId+'H'+String(mx+1).padStart(2,'0');
}
function sevIcon(s){ return s==='crit'?'⛔':s==='warn'?'⚠️':'ℹ️'; }
function sevBadge(s){ return `<span class="badge ${s==='crit'?'crit':s==='warn'?'warn':'info'}">${s==='crit'?'critical':s}</span>`; }

document.addEventListener('DOMContentLoaded',boot);

/* ===================== TIMELINE (shared renderer) ===================== */
function tlRange(cys,cfg,extendPast){
  const t=todayISO();
  let s=addISO(t,-45), e=addISO(t,200);
  cys.forEach(c=>{
    const ev=deriveCycle(c,cfg);
    Object.values(ev).forEach(seg=>{ if(seg&&seg.start){ if(seg.start<s&&extendPast)s=seg.start; if(seg.end>e)e=addISO(seg.end,14); }});
  });
  return {s:addISO(s,-3),e};
}

const KINDCOLOR={clone:'#00cec9',rack:'#8DC63F',roomVeg:'#8DC63Fcc',flower:null,ff:'#e84393',harvest:'#e74c3c',flip:'#5a7088',hang:null,bins:'#f0d5a5',defole:'#f39c12'};

function laneBars(cycles,kinds,cfg){
  const out=[];
  cycles.forEach(c=>{
    const ev=deriveCycle(c,cfg), rm=(cfg.rooms.find(r=>r.id===c.room)||{color:'#888'});
    kinds.forEach(k=>{
      const seg=ev[k]; if(!seg) return;
      let color=KINDCOLOR[k], label='';
      if(k==='flower'){ color=rm.color; label=c.id; }
      if(k==='roomVeg'){ label='veg'; }
      if(k==='rack'){ color=rm.color; label=c.id+' · rack veg'; }
      if(k==='clone'){ color=rm.color; label=c.id+' · clones'; }
      if(k==='hang'){ color=rm.color; label=c.id+' · hanging'; }
      if(k==='bins'){ label=c.id+' · bins'; }
      if(k==='harvest'){ label='HARVEST'; }
      if(k==='ff'){ label='FF'; }
      if(k==='flip'){ label='flip'; }
      out.push({cy:c,seg,kind:k,color,label});
    });
  });
  return out;
}

/* builds the tl-wrap block for any cycle set; opts: {allRooms, extendPast, scrollId} */
function buildTimeline(shown,cfg,conflicts,opts){
  opts=opts||{};
  const {s:RS,e:RE}=tlRange(shown,cfg,opts.extendPast);
  const days=diffDays(RS,RE)+1, Z=TL_ZOOM, W=days*Z, t=todayISO();

  const lanes=[];
  cfg.rooms.filter(r=>opts.allRooms||r.active||shown.some(c=>c.room===r.id)).forEach(r=>{
    lanes.push({id:r.id,nm:r.name,ds:r.lights+' lights',cycles:shown.filter(c=>c.room===r.id),kinds:['roomVeg','flower','ff','harvest','flip'],h:52});
  });
  lanes.push({id:'RACK',nm:'Veg Rack',ds:'rack rotation',cycles:shown,kinds:['rack'],h:44});
  lanes.push({id:'CLONE',nm:'Clone / Mom',ds:'cuts & rooting',cycles:shown,kinds:['clone'],h:44});
  lanes.push({id:'DRY',nm:'Dry Room',ds:'hang → bins',cycles:shown,kinds:['hang','bins'],h:60});

  let months='',dayCells='',gridLines='';
  let cur=RS;
  while(cur<=RE){
    const d=new Date(pd(cur));
    if(d.getUTCDate()===1||cur===RS){
      const mEnd=iso(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,0));
      const w=(diffDays(cur,mEnd>RE?RE:mEnd)+1)*Z;
      months+=`<div class="m" style="left:${diffDays(RS,cur)*Z}px;width:${w}px">${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()]} ${String(d.getUTCFullYear()).slice(2)}</div>`;
    }
    const x=diffDays(RS,cur)*Z;
    if(Z>=6){ if(Z>=10||dow(cur)===1) dayCells+=`<div class="d ${isWeekend(cur)?'we':''}" style="left:${x}px;width:${Z}px">${new Date(pd(cur)).getUTCDate()}</div>`; }
    else if(dow(cur)===1) dayCells+=`<div class="d" style="left:${x}px;width:${Z*7}px">${fmt(cur)}</div>`;
    if(dow(cur)===1) gridLines+=`<div class="tl-grid-line" style="left:${x}px"></div>`;
    cur=addISO(cur,1);
  }

  const rank={crit:0,warn:1,info:2};
  const byDate={};
  conflicts.forEach(c=>{ if(c.date>=RS&&c.date<=RE){ if(!byDate[c.date]||rank[c.sev]<rank[byDate[c.date].sev]) byDate[c.date]={sev:c.sev,items:[]}; }});
  conflicts.forEach(c=>{ if(byDate[c.date]) byDate[c.date].items.push(c); });
  let flags='';
  Object.entries(byDate).forEach(([d,g])=>{
    flags+=`<div class="tl-flag ${g.sev}" style="left:${diffDays(RS,d)*Z+Z/2-5}px;top:5px" data-tip="${esc(g.items.map(i=>sevIcon(i.sev)+' '+i.title).join('\n'))}" ${opts.flagClick||''}></div>`;
  });

  let lanesHtml='';
  lanes.forEach(L=>{
    const bars=laneBars(L.cycles,L.kinds,cfg).filter(b=>b.seg.end>=RS&&b.seg.start<=RE);
    const rows=[];
    bars.sort((a,b)=>a.seg.start<b.seg.start?-1:1).forEach(b=>{
      let ri=rows.findIndex(rEnd=>b.seg.start>rEnd);
      if(L.kinds.includes('flower')) ri=0;
      if(ri<0){ rows.push(b.seg.end); ri=rows.length-1; } else rows[ri]=b.seg.end>rows[ri]?b.seg.end:rows[ri];
      b.row=ri;
    });
    const nRows=Math.max(1,rows.length);
    const rowH=L.id==='DRY'||nRows>1?Math.min(24,(L.h-8)/nRows):L.h-16;
    let html='';
    if(L.kinds.includes('flower')) L.cycles.forEach(c=>{
      const ev=deriveCycle(c,cfg); if(!ev.window) return;
      if(!(ev.window.end<RS||ev.window.start>RE))
      html+=`<div style="position:absolute;top:4px;bottom:4px;left:${diffDays(RS,ev.window.start)*Z}px;width:${(diffDays(ev.window.start,ev.window.end)+1)*Z}px;background:repeating-linear-gradient(45deg,#4E9E8E18 0 6px,transparent 6px 12px);border-radius:4px;pointer-events:none"></div>`;
      ['defole1','defole2'].forEach(k=>{
        const dseg=ev[k]; if(!dseg||dseg.end<RS||dseg.start>RE) return;
        html+=`<div class="tl-mark" style="left:${diffDays(RS,dseg.start)*Z}px;width:${(diffDays(dseg.start,dseg.end)+1)*Z}px;top:4px;height:12px;background:#f39c12" data-tip="${esc(c.id+' — Defole '+dseg.n+' · '+fmt(dseg.start)+'–'+fmt(dseg.end)+' (flower day '+(ev.flowerDayOf(dseg.start))+')')}" onclick="openCycle('${c.id}')">${(diffDays(dseg.start,dseg.end)+1)*Z>=48?'DEFOLE':''}</div>`;
      });
    });
    bars.forEach(b=>{
      const x=diffDays(RS,b.seg.start<RS?RS:b.seg.start)*Z;
      const w=Math.max(Z,(diffDays((b.seg.start<RS?RS:b.seg.start),(b.seg.end>RE?RE:b.seg.end))+1)*Z-1);
      const top=L.kinds.includes('flower')?18:6+b.row*(rowH+3);
      const h=L.kinds.includes('flower')?(L.h-24):rowH;
      const bg=b.kind==='bins'?'#c9a86a':b.color;
      const op=b.kind==='roomVeg'?'55':(b.kind==='flip'?'66':(b.kind==='rack'?'99':(b.kind==='clone'?'77':(b.kind==='hang'?'aa':''))));
      const est=b.cy.estimated?' · est.':'';
      html+=`<div class="tl-bar" style="left:${x}px;width:${w}px;top:${top}px;height:${h}px;background:${bg}${op}" data-tip="${esc(b.cy.id+' — '+({clone:'Clones (cut → rack)',rack:'Veg on rack',roomVeg:'Veg in room',flower:'Flower',ff:'FF harvest',harvest:'Dry-flower harvest',flip:'Room flip',hang:'Dry room — hanging',bins:'Dry room — in bins'})[b.kind]+' · '+fmtR(b.seg.start)+' – '+fmtR(b.seg.end)+est)}" onclick="openCycle('${b.cy.id}')"><span class="lbl">${w>34?esc(b.label):''}</span></div>`;
    });
    lanesHtml+=`<div class="tl-lane" style="height:${L.h}px">${gridLines}${html}
      <div class="tl-today" style="left:${diffDays(RS,t)*Z}px"></div>
      <div class="tl-lane-label"><span class="nm">${esc(L.nm)}</span><span class="ds">${esc(L.ds)}</span></div></div>`;
  });

  return `<div class="tl-wrap">
    <div class="tl-scroll" id="${opts.scrollId||'tl-scroll'}" data-rs="${RS}"><div class="tl-inner" style="width:${W}px">
      <div class="tl-months" style="position:relative">${months}<div style="position:absolute;left:${diffDays(RS,t)*Z}px" class="tl-today-tag">TODAY</div></div>
      <div class="tl-days">${dayCells}${flags}</div>
      ${lanesHtml}
    </div></div>
    <div class="tl-legend">
      <span class="k"><span class="sw" style="background:#00cec9"></span>Clones</span>
      <span class="k"><span class="sw" style="background:#8DC63F"></span>Veg</span>
      <span class="k"><span class="sw" style="background:#4E9E8E"></span>Flower F1</span>
      <span class="k"><span class="sw" style="background:#4A90B5"></span>Flower F2</span>
      <span class="k"><span class="sw" style="background:#9b59b6"></span>Flower F3</span>
      <span class="k"><span class="sw" style="background:repeating-linear-gradient(45deg,#4E9E8E55 0 4px,transparent 4px 8px)"></span>Harvest window (d56–65)</span>
      <span class="k"><span class="sw" style="background:#f39c12"></span>Defole</span>
      <span class="k"><span class="sw" style="background:#e84393"></span>FF harvest</span>
      <span class="k"><span class="sw" style="background:#e74c3c"></span>Harvest</span>
      <span class="k"><span class="sw" style="background:#5a7088"></span>Room flip</span>
      <span class="k"><span class="sw" style="background:#c9a86a"></span>Dry: bins</span>
      <span class="k"><span style="color:var(--red)">●</span>/<span style="color:var(--orange)">●</span>/<span style="color:var(--blue)">●</span> conflicts</span>
    </div>
  </div>`;
}

function scrollToToday(id){
  const sc=document.getElementById(id||'tl-scroll'); if(!sc) return;
  sc.scrollLeft=Math.max(0,diffDays(sc.dataset.rs,todayISO())*TL_ZOOM-sc.clientWidth*0.35);
}

/* ---------- zoom controls (shared) ---------- */
function zoomControls(){
  const presets=[['Month',3],['Default',6],['Day',12]];
  return `<div class="zoom">${presets.map(([n,z])=>`<button class="${Math.abs(TL_ZOOM-z)<0.01?'on':''}" onclick="TL_ZOOM=${z};render()">${n}</button>`).join('')}
    <button title="Zoom out" onclick="TL_ZOOM=Math.max(2,+(TL_ZOOM/1.25).toFixed(2));render()">−</button>
    <button title="Zoom in" onclick="TL_ZOOM=Math.min(24,+(TL_ZOOM*1.25).toFixed(2));render()">+</button>
  </div>`;
}

/* ---------- ACTUAL timeline view ---------- */
function renderTimeline(conflicts){
  const shown=TL_HISTORY?S.cycles:S.cycles.filter(c=>!c.archived);
  $('#main').innerHTML=`
  <div class="pagehead"><div><h2>F1/F2 Production Calendar</h2><div class="sub">Actual schedule — all rooms, veg rack, clones & dry room · today is ${fmtR(todayISO())}</div></div>
    <div class="hd-actions">${headerButtons()}</div></div>
  <div class="tl-controls">

function nextUpPanel(){
  const t=todayISO(), items=[];
  S.cycles.filter(c=>!c.archived).forEach(c=>{
    const ev=deriveCycle(c,S.config);
    [['cloneCut','Clone cut',c.dates.cloneCut],['transplantRack','Transplant → rack',c.dates.transplantRack],['transplantRoom','Transplant → room',c.dates.transplantRoom]].forEach(([k,nm,d])=>{ if(d&&d>=t) items.push({d,nm,cy:c.id}); });
    if(ev.defole1&&ev.defole1.start>=t) items.push({d:ev.defole1.start,nm:'Defole 1',cy:c.id});
    if(ev.defole2&&ev.defole2.start>=t) items.push({d:ev.defole2.start,nm:'Defole 2',cy:c.id});
    if(ev.ff&&ev.ff.start>=t) items.push({d:ev.ff.start,nm:'FF harvest',cy:c.id});
    if(ev.harvest&&ev.harvest.start>=t) items.push({d:ev.harvest.start,nm:'Harvest',cy:c.id});
    if(ev.flip&&ev.flip.start>=t) items.push({d:ev.flip.start,nm:'Room flip',cy:c.id});
    if(ev.bins&&ev.bins.end>=t) items.push({d:ev.bins.end,nm:'Bins out of dry room',cy:c.id});
  });
  items.sort((a,b)=>a.d<b.d?-1:1);
  const rows=items.slice(0,10).map(i=>{
    const dd=diffDays(t,i.d);
    return `<tr onclick="openCycle('${i.cy}')" style="cursor:pointer"><td class="mono">${fmtR(i.d)}</td><td>${esc(i.nm)}</td><td class="muted">${i.cy}</td><td class="mono muted">${dd===0?'today':'in '+dd+'d'}</td></tr>`;
  }).join('');
  return `<div class="card" style="margin-top:16px"><h3>Next up</h3><table class="tbl"><thead><tr><th>Date</th><th>Event</th><th>Cycle</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan=4 class=empty>Nothing scheduled ahead.</td></tr>'}</tbody></table></div>`;
}

function headerButtons(){
  return (isAdmin()?`<span id="pub-hint" class="badge warn" style="display:none">unpublished changes</span>
    <button class="btn primary" onclick="publish()">Publish</button>`:`<span id="pub-hint" style="display:none"></span>`);
}

/* tooltips */
function attachTips(){
  const tip=$('#tip');
  $$('[data-tip]').forEach(el=>{
    el.onmouseenter=e=>{ tip.innerHTML=esc(el.dataset.tip).replace(/\n/g,'<br>'); tip.style.display='block'; };
    el.onmousemove=e=>{ tip.style.left=Math.min(e.clientX+14,window.innerWidth-320)+'px'; tip.style.top=(e.clientY+16)+'px'; };
    el.onmouseleave=()=>tip.style.display='none';
  });
}

/* ===================== CONFLICTS ===================== */
function renderConflicts(conflicts){
  const t=todayISO();
  const fut=conflicts.filter(c=>c.date>=t), past=conflicts.filter(c=>c.date<t);
  const row=c=>`<div class="cf-row"><div class="ic">${sevIcon(c.sev)}</div>
    <div><div class="tt">${esc(c.title)} ${sevBadge(c.sev)}</div><div class="dd">${esc(c.detail)}</div>
    <div class="small faint" style="margin-top:4px">${c.cycles.map(id=>`<a href="javascript:openCycle('${id}')">${id}</a>`).join(' · ')}</div></div>
    <div class="dt">${fmtR(c.date)}</div></div>`;
  const groups=['crit','warn','info'].map(sv=>{
    const items=fut.filter(c=>c.sev===sv);
    if(!items.length) return '';
    return `<div class="card" style="margin-bottom:14px;padding:0"><h3 style="padding:14px 16px 0">${sv==='crit'?'⛔ Critical':sv==='warn'?'⚠️ Warnings':'ℹ️ Heads-up'} <span class="muted">(${items.length})</span></h3>${items.map(row).join('')}</div>`;
  }).join('');
  $('#main').innerHTML=`
  <div class="pagehead"><div><h2>Conflicts</h2><div class="sub">Actual schedule only — the 3-Room Planner shows its own flags. Nothing is auto-moved.</div></div>
  <div class="hd-actions">${headerButtons()}</div></div>
  ${fut.length?groups:`<div class="card"><div class="empty">✅ No upcoming conflicts detected across ${S.cycles.filter(c=>!c.archived).length} active cycles.</div></div>`}
  ${past.length?`<details style="margin-top:16px"><summary class="muted small" style="cursor:pointer">${past.length} past conflict(s)</summary><div class="card" style="margin-top:8px;padding:0">${past.map(row).join('')}</div></details>`:''}`;
}

/* ===================== CYCLES ===================== */
function cycleCard(c){
  const ev=deriveCycle(c,S.config), st=cycleStatus(c,ev), rm=roomOf(c.room);
  let prog='';
  if(ev.flower){
    const total=diffDays(ev.flower.start,ev.harvest.end), done=Math.max(0,Math.min(total,diffDays(ev.flower.start,todayISO())));
    if(st.phase==='flower'||st.phase==='ff'||st.phase==='harvest') prog=`<div class="prog"><i style="width:${Math.round(done/total*100)}%;background:${rm.color}"></i></div><div class="small faint">flower day ${ev.flowerDayOf(todayISO())} of ~${S.config.defaults.harvestPlanDay} planned</div>`;
  }
  const d=c.dates;
  return `<div class="cy-card">
    <div class="top"><span class="code">${esc(c.id)}</span>
      <span class="roomtag" style="background:${rm.color}">${rm.id}</span>
      ${c.estimated?'<span class="badge est">estimated</span>':''}
      <span style="margin-left:auto" class="badge dim">${st.label}</span></div>
    ${prog}
    <div class="cy-dates">
      <span class="k">Clone cut</span><span class="v mono">${fmtR(d.cloneCut)}</span>
      <span class="k">→ Rack</span><span class="v mono">${fmtR(d.transplantRack)}</span>
      <span class="k">→ Room</span><span class="v mono">${fmtR(d.transplantRoom)}</span>
      <span class="k">Flower day 1</span><span class="v mono">${fmtR(d.flowerDay1)}</span>
      <span class="k">Defole 1 / 2</span><span class="v mono">${ev.defole1?fmt(ev.defole1.start):'—'} / ${ev.defole2?fmt(ev.defole2.start):'—'}</span>
      <span class="k">FF → Harvest</span><span class="v mono">${ev.ff?fmt(ev.ff.start):'—'} → ${ev.harvest?fmt(ev.harvest.start)+'–'+fmt(ev.harvest.end):'—'}</span>
      <span class="k">Flip</span><span class="v mono">${ev.flip?fmt(ev.flip.start)+'–'+fmt(ev.flip.end):'—'}</span>
      <span class="k">Dry: hang / bins</span><span class="v mono">${ev.hang?fmt(ev.hang.start)+'–'+fmt(ev.hang.end):'—'} / ${ev.bins?'→ '+fmt(ev.bins.end):'—'}</span>
    </div>
    ${c.notes?`<div class="small faint" style="margin-top:9px">${esc(c.notes)}</div>`:''}
    <div class="cy-foot">${isAdmin()?`<button class="btn small" onclick="openCycle('${c.id}')">Edit</button>
      <button class="btn small" onclick="archiveCycle('${c.id}')">Archive</button>`:`<button class="btn small" onclick="openCycle('${c.id}')">Details</button>`}</div>
  </div>`;
}

function renderCycles(){
  const live=S.cycles.filter(c=>!c.archived).sort((a,b)=>(a.dates.flowerDay1||a.dates.cloneCut||'9999')<(b.dates.flowerDay1||b.dates.cloneCut||'9999')?-1:1);
  $('#main').innerHTML=`
  <div class="pagehead"><div><h2>Cycles</h2><div class="sub">Enter the 4 dates — clone cut, transplant to rack, transplant to room, flower day 1 — and the rest auto-builds.</div></div>
  <div class="hd-actions">${isAdmin()?'<button class="btn" onclick="openCycle(null)">+ New cycle</button>':''}${headerButtons()}</div></div>
  <div class="grid3">${live.map(cycleCard).join('')||'<div class="empty">No active cycles.</div>'}</div>`;
}

    <div><label class="small">FF harvest start <span class="faint">(auto: ${D.ffHarvestDays}d pre-harvest)</span></label>${dateIn('ffHarvestStart',o.ffHarvestStart)}</div>
    <div><label class="small">Harvest start <span class="faint">(auto: flower d${D.harvestPlanDay})</span></label>${dateIn('harvestStart',o.harvestStart)}</div>
    <div><label class="small">Harvest end</label>${dateIn('harvestEnd',o.harvestEnd)}</div>

  </div>

function suggestDates(){
  const D=S.config.defaults, cut=$('#cy-cloneCut').value;
  if(!cut){ toast('Set the clone cut date first'); return; }
  const rack=addISO(cut,D.cutToRackDays), room=addISO(rack,D.rackToRoomDays);
  $('#cy-transplantRack').value=rack; $('#cy-transplantRoom').value=room; $('#cy-flowerDay1').value=addISO(room,D.roomToFlowerDays||0);
}
function saveCycle(){
  const v=k=>$('#cy-'+k).value||null;
  const dates={cloneCut:v('cloneCut'),transplantRack:v('transplantRack'),transplantRoom:v('transplantRoom'),flowerDay1:v('flowerDay1')};
  const overrides={};
  ['defole1Start','defole2Start','ffHarvestStart','harvestStart','harvestEnd','flipStart','flipEnd'].forEach(k=>{ if(v(k)) overrides[k]=v(k); });
  if(EDIT_ID){
    const c=cycleById(EDIT_ID); c.dates=dates; c.overrides=overrides; c.notes=$('#cy-notes').value; c.estimated=$('#cy-est').checked;
  }else{
    const code=$('#cy-code').value.trim()||nextCode($('#cy-room').value);
    if(cycleById(code)){ toast('Code '+code+' already exists'); return; }
    S.cycles.push({id:code,room:$('#cy-room').value,archived:false,estimated:$('#cy-est').checked,dates,overrides,notes:$('#cy-notes').value});
  }
  markDirty(); closeModal(); render(); toast('Saved — remember to Publish');
}
function archiveCycle(id){ const c=cycleById(id); c.archived=!c.archived; markDirty(); render(); }
function deleteCycle(id){ if(!confirm('Delete '+id+' entirely? (Archive keeps it in History instead.)')) return; S.cycles=S.cycles.filter(c=>c.id!==id); if(S.mock&&S.mock.cycles) S.mock.cycles=S.mock.cycles.filter(c=>c.id!==id); markDirty(); closeModal(); render(); }

/* ===================== CLONE ORDERS ===================== */
function orderCounts(o){
  const rm=roomOf(o.room), D=S.config.defaults;
  const per=rm.clonesPerSlot||90, cut=Math.ceil(per*(1+(D.overagePct||70)/100));
  const n=o.slots.length;
  return {per,cut,needed:per*n,cutTotal:cut*n};
}
function updateOrderSlot(oid,i,field,val){ const o=S.cloneOrders.find(x=>x.id===oid); if(!o)return; o.slots[i][field]=val; markDirty(); }
function updateOrderField(oid,field,val){ const o=S.cloneOrders.find(x=>x.id===oid); if(!o)return; o[field]=val||null; markDirty(); }
function dupOrder(oid){
  const src=S.cloneOrders.find(x=>x.id===oid); if(!src)return;
  const id='co-dup-'+oid+'-'+(S.cloneOrders.length+1);
  S.cloneOrders.push({id,room:src.room,cutDate:null,transplantDate:null,status:'planned',
    slots:src.slots.map(s=>({loc:s.loc,strain:s.strain,note:s.note})),notes:'Duplicated from '+(src.cutDate?'cut '+fmtR(src.cutDate):'order')});
  markDirty(); render(); openOrder(id); toast('Duplicated — set the new cut & transplant dates');
}
function renderOrders(){
  const orders=[...S.cloneOrders].sort((a,b)=>((b.cutDate||b.transplantDate||'')>(a.cutDate||a.transplantDate||'')?1:-1));
  const ad=isAdmin();
  const cards=orders.map((o,i)=>{
    const cts=orderCounts(o), rm=roomOf(o.room);
    const open=i===0?'open':'';

    const succ=o.actualCount?Math.round(o.actualCount/cts.needed*100):null;
    const slotRows=o.slots.map((s,idx)=>ad?
      `<tr><td class="muted" style="width:110px">${esc(s.loc)}</td>
        <td><input list="strain-dl" value="${esc(s.strain)}" style="width:100%" onclick="event.stopPropagation()" onchange="updateOrderSlot('${o.id}',${idx},'strain',this.value)"></td>
        <td style="width:190px"><input value="${esc(s.note||'')}" placeholder="note" style="width:100%" onclick="event.stopPropagation()" onchange="updateOrderSlot('${o.id}',${idx},'note',this.value)"></td></tr>`:
      `<tr><td class="muted">${esc(s.loc)}</td><td>${esc(s.strain)||'<span class=faint>—</span>'}</td><td class="small faint">${esc(s.note||'')}</td></tr>`).join('');
    return `<div class="co-card ${open}" id="co-${o.id}">
    <div class="co-head" onclick="this.parentElement.classList.toggle('open')">
      <span class="arrow">▶</span>
      <span class="roomtag" style="background:${rm.color};font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#04110e">${rm.id}</span>
      <span class="ttl">Cut ${fmtR(o.cutDate)||'TBD'}</span>

      ${ad?`<button class="btn small" onclick="event.stopPropagation();openOrder('${o.id}')">Edit</button>
      <button class="btn small" onclick="event.stopPropagation();dupOrder('${o.id}')">Duplicate</button>`:''}
    </div>
    <div class="co-body">
      <div class="co-stats" style="align-items:flex-end">
        ${ad?`<span>Cut date<br><input type="date" value="${o.cutDate||''}" onchange="updateOrderField('${o.id}','cutDate',this.value);render()"></span>
        <span>Transplant<br><input type="date" value="${o.transplantDate||''}" onchange="updateOrderField('${o.id}','transplantDate',this.value);render()"></span>`:''}
        <span><b>${cts.per}</b> clones / slot</span><span><b>${cts.cut}</b> cut / slot (+${S.config.defaults.overagePct}%)</span>
        <span><b>${cts.needed}</b> total needed</span><span><b>${cts.cutTotal}</b> total cut</span>
        ${succ!=null?`<span><b>${succ}%</b> of needed survived (${o.actualCount})</span>`:''}
      </div>
      <table class="tbl"><thead><tr><th>Location</th><th>Strain ${ad?'<span class="faint" style="text-transform:none">(type to edit — saves instantly)</span>':''}</th><th>Note</th></tr></thead><tbody>

      ${o.notes?`<div class="small faint" style="margin-top:8px">${esc(o.notes)}</div>`:''}

  <div class="hd-actions">${ad?'<button class="btn primary" onclick="openOrder(null)">+ New clone order</button>':''}${headerButtons()}</div></div>
  <datalist id="strain-dl">${S.strains.map(s=>`<option value="${esc(s.name)}">`).join('')}</datalist>
  <div style="display:flex;flex-direction:column;gap:10px">${cards||'<div class=empty>No orders yet.</div>'}</div>
  <div class="card" style="margin-top:20px;padding:0"><h3 style="padding:14px 16px 0">Strain list</h3>
    <table class="tbl"><thead><tr><th>Strain</th><th>Category</th><th>Abbr</th>${isAdmin()?'<th></th>':''}</tr></thead><tbody>
    ${S.strains.map((s,i)=>`<tr><td>${esc(s.name)}</td><td class="muted">${esc(s.category||'')}</td><td class="faint">${esc(s.abbr||'')}</td>${isAdmin()?`<td><button class="btn small" onclick="delStrain(${i})">✕</button></td>`:''}</tr>`).join('')}
    </tbody></table>
    ${isAdmin()?`<div style="display:flex;gap:8px;padding:12px 16px"><input id="ns-name" placeholder="New strain name"><input id="ns-cat" placeholder="Category" style="width:130px"><input id="ns-abbr" placeholder="Abbr" style="width:80px"><button class="btn small" onclick="addStrain()">Add</button></div>`:''}
  </div>`;
}

function setOrderStatus(id,v){ S.cloneOrders.find(o=>o.id===id).status=v; markDirty(); }
function setOrderActual(id,v){ S.cloneOrders.find(o=>o.id===id).actualCount=+v||null; markDirty(); render(); }
function deleteOrder(id){ if(!confirm('Delete this clone order?'))return; S.cloneOrders=S.cloneOrders.filter(o=>o.id!==id); markDirty(); render(); }

function saveOrder(){
  const slots=window._orderSlots.map((s,i)=>({loc:s.loc,strain:$('#os-'+i).value.trim(),note:$('#on-'+i).value.trim()||undefined}));
  const room=$('#o-room').value, cut=$('#o-cut').value||null, tp=$('#o-tp').value||null;

function mockStore(){
  if(!S.mock) S.mock={settings:{anchor:'2027-01-05',staggerDays:23,perRoom:3,template:'weeklock'},cycles:[]};
  if(!S.mock.settings) S.mock.settings={anchor:'2027-01-05',staggerDays:23,perRoom:3,template:'weeklock'};
  if(!S.mock.settings.template) S.mock.settings.template='even';
  if(!S.mock.cycles) S.mock.cycles=[];
  return S.mock;
}
function mockConfig(){
  return {...S.config, rooms:S.config.rooms.map(r=>({...r,active:true}))};
}
function roomInterval(harvestDay){
  const D=S.config.defaults;
  // flower day 1 → next flower day 1: harvest (2d) ends day hd+1, flip 4d, transplant next day
  return (harvestDay||D.harvestPlanDay)+D.dryHarvestDays+D.flipDays-1;
}
function snapToDow(isoStr,targetDow){ // next date >= isoStr with day-of-week targetDow (0=Sun)
  let d=isoStr; for(let i=0;i<7;i++){ if(dow(d)===targetDow) return d; d=addISO(d,1);} return isoStr;
}

function genMockPlan(){
  const M=mockStore(), D=S.config.defaults;
  const template=$('#pl-template').value;
  let anchor=$('#pl-anchor').value;
  const per=Math.min(6,Math.max(1,+$('#pl-per').value||3));
  if(!anchor){ toast('Set the F1 flower day 1 anchor date first'); return; }
  let stag=+$('#pl-stagger').value||23;
  M.cycles=[];

  if(template==='weeklock'){
    /* Weekday-locked 10-week template — every offset is a multiple of 7 so every event
       repeats on the same weekday forever:
       f1 = Tuesday · cut Mon (f1-36) · rack Mon (f1-15) · defoles start Mon
       harvest day 65 (Wed-Thu) · FF Mon-Tue · flip Fri-Mon · next transplant Tue (+70)
       Room offsets 0/21/42 → harvest gaps 21/21/28.
       Structural collisions solved by per-room defole shifts (all stay Monday starts):
         middle room (21d behind): defole 2 a week early (day 35) — else it lands on the leader's harvest
         third room (42d behind): defole 1 early (day 14) AND defole 2 early (day 35)
         first room: standard day 21 / day 42 */
    anchor=snapToDow(anchor,2); // Tuesday
    const interval=70; stag=21;
    const offs=[0,21,42];
    ['F1','F2','F3'].forEach((r,i)=>{
      for(let k=0;k<per;k++){
        const f1=addISO(anchor,offs[i]+k*interval);
        const o={harvestStart:addISO(f1,64),harvestEnd:addISO(f1,65)};
        if(i>=1) o.defole2Start=addISO(f1,34);   // day 35
        if(i===2) o.defole1Start=addISO(f1,13);  // day 14
        M.cycles.push({id:'P·'+r+'-'+(k+1),room:r,mock:true,archived:false,estimated:false,
          dates:{cloneCut:addISO(f1,-36),transplantRack:addISO(f1,-15),transplantRoom:f1,flowerDay1:f1},
          overrides:o,notes:'weekday-locked template'});
      }
    });
    // dodge: clone cuts that land inside another cycle's FF→harvest block shift back one week (stays Monday)
    const blocks=M.cycles.map(c=>({id:c.id,start:addISO(c.overrides.harvestStart,-D.ffHarvestDays),end:c.overrides.harvestEnd}));
    M.cycles.forEach(c=>{
      const hit=b=>blocks.some(x=>x.id!==c.id&&c.dates.cloneCut>=x.start&&c.dates.cloneCut<=x.end);
      if(hit()) c.dates.cloneCut=addISO(c.dates.cloneCut,-7);
    });
    // cap dry-room bins at the day before the next hang starts (your rule: bins out early, min 5d)
    const hangs=M.cycles.map(c=>({c,h:c.overrides.harvestStart})).sort((a,b)=>a.h<b.h?-1:1);
    hangs.forEach((x,i)=>{
      const hangEnd=addISO(x.h,D.dryHangDays-1);
      const natural=addISO(hangEnd,D.dryBinDays);
      const next=hangs[i+1]?addISO(hangs[i+1].h,-1):null;
      x.c.overrides.dryBinsEnd=(next&&next<natural)?next:natural;
    });
    M.settings={anchor,staggerDays:stag,perRoom:per,template};
  }else{
    /* Even-stagger max-throughput: tightest repeat, weekdays drift */
    const interval=roomInterval();
    ['F1','F2','F3'].forEach((r,i)=>{
      for(let k=0;k<per;k++){
        const f1=addISO(anchor,i*stag+k*interval);
        const troom=f1, track=addISO(troom,-(D.rackToRoomDays||10)), cut=addISO(track,-(D.cutToRackDays||21));
        M.cycles.push({id:'P·'+r+'-'+(k+1),room:r,mock:true,archived:false,estimated:false,
          dates:{cloneCut:cut,transplantRack:track,transplantRoom:troom,flowerDay1:f1},overrides:{},notes:'even-stagger template'});
      }
    });
    M.settings={anchor,staggerDays:stag,perRoom:per,template};
  }
  markDirty(); render();
  toast('Mock plan generated — '+M.cycles.length+' cycles ('+(template==='weeklock'?'weekday-locked':'even stagger')+')');
}
function clearMockPlan(){ if(!confirm('Clear the mock plan?'))return; mockStore().cycles=[]; markDirty(); render(); }

function plannerStats(mockCys,cfg,conflicts){
  const D=cfg.defaults;
  // derive real numbers from the generated cycles
  const byRoom={};
  mockCys.forEach(c=>{ if(c.dates.flowerDay1){ (byRoom[c.room]=byRoom[c.room]||[]).push(c.dates.flowerDay1); }});
  const intervals=[];
  Object.values(byRoom).forEach(list=>{ list.sort(); for(let i=1;i<list.length;i++) intervals.push(diffDays(list[i-1],list[i])); });
  const avgInt=intervals.length?intervals.reduce((a,b)=>a+b,0)/intervals.length:roomInterval();
  const harvests=mockCys.map(c=>deriveCycle(c,cfg)).filter(ev=>ev.harvest).map(ev=>ev.harvest.start).sort();
  const gaps=[]; for(let i=1;i<harvests.length;i++) gaps.push(diffDays(harvests[i-1],harvests[i]));
  const minGap=gaps.length?Math.min(...gaps):0, avgGap=gaps.length?Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length):0;
  const binDays=mockCys.map(c=>deriveCycle(c,cfg)).filter(ev=>ev.bins).map(ev=>diffDays(ev.bins.start,ev.bins.end)+1);
  const minBins=binDays.length?Math.min(...binDays):0;
  const perYear=(365/avgInt*3);
  const nCrit=conflicts.filter(c=>c.sev==='crit').length, nWarn=conflicts.filter(c=>c.sev==='warn').length;
  const weekendFlags=conflicts.filter(c=>c.title.includes('weekend')).length;
  return `<div class="grid3" style="margin-bottom:14px">
    <div class="card"><h3>Throughput</h3><div style="font-size:22px;color:var(--text-bright);font-weight:800">${perYear.toFixed(1)} harvests / yr</div>
      <div class="small faint" style="margin-top:4px">${(365/avgInt).toFixed(2)} flips/room/yr · ${Math.round(avgInt)}-day room cycle · a harvest every ${avgGap} days (min gap ${minGap}d)</div></div>

    <div class="card"><h3>Alerts</h3><div style="font-size:22px;font-weight:800;color:${nCrit?'var(--red)':nWarn?'var(--orange)':'var(--ok)'}">${nCrit} critical · ${nWarn} warnings</div>
      <div class="small faint" style="margin-top:4px">${weekendFlags} weekend heads-ups. Full list below — switch templates or hand-tweak bars to compare.</div></div>
  </div>`;
}

/* ===================== MOM CAPACITY ===================== */
function momStore(){
  if(!S.momCapacity) S.momCapacity={cutsPerMom:20,sessions:1,growWks:8,capacity:80,anchor:'2026-09-11'};
  return S.momCapacity;
}
const MOM_PLAN={cycle:70,stag:21}; // weekday-locked 3-room plan

// peak moms for a given set of assumptions (holds plan + order size constant)
function momPeak(cutsPerMom,sessions,growWks){
  const D=S.config.defaults;
  const rF12=roomOf('F1'), rF3=roomOf('F3');
  const over=(D.overagePct||70)/100;
  const cutF12=Math.ceil((rF12.slots||12)*(rF12.clonesPerSlot||90)*(1+over));
  const cutF3 =Math.ceil((rF3.slots||12)*(rF3.clonesPerSlot||59)*(1+over));
  const yld=Math.max(1,cutsPerMom*sessions);
  const momF12=Math.ceil(cutF12/yld), momF3=Math.ceil(cutF3/yld);
  const growDays=growWks*7, lead=(D.cutToRackDays||21)+(D.rackToRoomDays||10);
  const M=momStore();
  const events=[];
  ['F1','F2','F3'].forEach((rm,i)=>{ for(let k=0;k<6;k++){
    const flower=addISO(M.anchor,i*MOM_PLAN.stag+k*MOM_PLAN.cycle);
    events.push({room:rm,cut:addISO(flower,-lead),moms:(rm==='F3'?momF3:momF12)});
  }});
  let peak=0,peakDate=null,batches=[];
  events.forEach(e=>{
    const win=events.filter(x=>x.cut>=e.cut&&x.cut<=addISO(e.cut,growDays));
    const occ=win.reduce((s,x)=>s+x.moms,0);
    if(occ>peak){peak=occ;peakDate=e.cut;batches=win.slice().sort((a,b)=>a.cut<b.cut?-1:1);}
  });
  return {peak,peakDate,batches,cutF12,cutF3,momF12,momF3,yld,growDays,cutsYr:null};
}
function momModel(){
  const D=S.config.defaults, M=momStore();
  const p=momPeak(M.cutsPerMom,M.sessions,M.growWks);
  const flipsYr=365/MOM_PLAN.cycle;
  const cutsYr=Math.round(flipsYr*(2*p.cutF12+p.cutF3));
  const momsYr=Math.round(flipsYr*(2*p.momF12+p.momF3));
  return {...p,cap:M.capacity,cutsYr,momsYr};
}
// smallest cuts/mom that still fits capacity (current sessions & grow-up)
function breakEvenCuts(){
  const M=momStore();
  for(let x=1;x<=200;x++){ if(momPeak(x,M.sessions,M.growWks).peak<=M.capacity) return x; }
  return null;
}
// most grow-up weeks that still fits (current cuts/mom & sessions)
function breakEvenWeeks(){
  const M=momStore();
  let best=0;
  for(let w=2;w<=20;w++){ if(momPeak(M.cutsPerMom,M.sessions,w).peak<=M.capacity) best=w; }
  return best;
}
function setMom(k,v){ momStore()[k]=(k==='anchor'?v:(+v||0)); markDirty(); renderMom(); }
function setMomLive(k,v){ momStore()[k]=+v||0; /* no full render */ const el=$('#mom-live'); markDirty(); if(el) el.outerHTML=momLiveBlock(); }

  return `<div id="mom-live">

function renderMom(){
  const m=momModel(), M=momStore(), ad=isAdmin(), ro=ad?'':'disabled';
  const beCuts=breakEvenCuts(), beWeeks=breakEvenWeeks(), fits=m.peak<=m.cap;
  const slider=(k,min,max,step,val)=>`<input type="range" min="${min}" max="${max}" step="${step}" value="${val}" ${ro} style="width:100%;accent-color:var(--teal)" oninput="setMomLive('${k}',this.value)" onchange="setMom('${k}',this.value)">`;
  const numin=(k,val,w)=>`<input type="number" value="${val}" ${ro} style="width:${w||70}px" onchange="setMom('${k}',this.value)">`;

  $('#main').innerHTML=`
  <div class="pagehead"><div><h2>Mom Capacity</h2><div class="sub">Can the mom room grow enough moms to feed all three rooms? Drag the sliders to see what it takes.</div></div>
    <div class="hd-actions">${headerButtons()}</div></div>

  ${momLiveBlock()}

  <div class="grid2" style="margin-bottom:16px">
    <div class="card"><h3>Your numbers ${ad?'':'<span class="faint" style="text-transform:none">(view only)</span>'}</h3>
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px"><label class="small" style="color:var(--text-dim)">Cuts each mom gives</label><b class="mono" style="color:var(--text-bright)">${M.cutsPerMom}</b></div>
        ${slider('cutsPerMom',5,100,1,M.cutsPerMom)}
      </div>
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px"><label class="small" style="color:var(--text-dim)">Weeks to grow a mom</label><b class="mono" style="color:var(--text-bright)">${M.growWks}</b></div>
        ${slider('growWks',2,14,1,M.growWks)}
      </div>
      <div class="set-grid" style="margin-top:4px">
        <div class="set-item"><label>Times you cut each mom <span class="faint">(1 = cut once & toss)</span></label>${numin('sessions',M.sessions)}</div>
        <div class="set-item"><label>Mom room capacity (plants)</label>${numin('capacity',M.capacity)}</div>
      </div>
      <div class="small faint" style="margin-top:10px">Order size comes from <a href="javascript:nav('settings')">Settings</a> — one room = ${m.cutF12.toLocaleString()} cuts. A mom gives <b>${m.yld}</b> cuts total (${M.cutsPerMom}×${M.sessions}).</div>
    </div>

    <div class="card"><h3>The bottom line</h3>
      <div style="padding:12px;border-radius:8px;background:${fits?'#2ecc7112':'#e74c3c12'};border:1px solid ${fits?'#2ecc7133':'#e74c3c33'};margin-bottom:12px">
        <div class="small muted">Smallest mom that still fits your ${m.cap}-plant room<br><span class="faint">(at ${M.growWks}-wk grow-up, cutting each mom ${M.sessions}×)</span></div>
        <div style="font-size:22px;font-weight:800;color:var(--text-bright);margin-top:4px">${beCuts?beCuts+' cuts per mom':'—'}
          <span style="font-size:13px;font-weight:600;color:${fits?'var(--ok)':'var(--red)'}">${beCuts?(M.cutsPerMom>=beCuts?`· you're at ${M.cutsPerMom} ✓`:`· you're at ${M.cutsPerMom} ✗`):''}</span></div>
      </div>
      <div class="small" style="line-height:1.6">
        Ways to make it fit, strongest first:<br>
        <b style="color:var(--text-bright)">Bigger moms</b> — more cuts each; the single biggest lever.<br>
        <b style="color:var(--text-bright)">Reuse moms</b> — cut each mom more than once (raise "times cut" above 1).<br>
        <b style="color:var(--text-bright)">Faster grow-up</b> — at ${M.cutsPerMom} cuts/mom you can afford up to <b>${beWeeks||'—'} weeks</b> and still fit.<br>
        <b style="color:var(--text-bright)">Fewer cuts</b> — trim the ${(S.config.defaults.overagePct)}% overage on proven strains.
      </div>
    </div>
  </div>

  <div class="card">
    <div class="small faint">This is the strategic room-sizing view. For the everyday "do I have enough moms to cut this order" check, use the <a href="javascript:nav('calc')">Moms → Cuts</a> tab. Both use the same cuts-per-mom idea; this one adds the three-room timing.</div>
  </div>`;
}

/* ===================== MOMS → CUTS (mom inventory, cut-to-kill) ===================== */
function invStore(){
  if(!S.momInv){
    S.momInv={
      yield:{S:12,M:25,L:45},
      rows:[
        {label:'Lion\'s Breath',age:8,size:'L',count:6},
        {label:'Purple Push Pop',age:6,size:'M',count:8},
        {label:'Alien Marker',age:4,size:'S',count:10}
      ],
      cutsNeeded:1836
    };
  }
  if(!S.momInv.yield) S.momInv.yield={S:12,M:25,L:45};
  if(!S.momInv.rows) S.momInv.rows=[];
  return S.momInv;
}
function setInvYield(sz,v){ invStore().yield[sz]=+v||0; markDirty(); renderCalc(); }
function setInvRow(i,f,v){ const r=invStore().rows[i]; if(!r)return; r[f]=(f==='label'||f==='size')?v:(+v||0); markDirty(); renderCalc(); }
function addInvRow(){ invStore().rows.push({label:'',age:'',size:'M',count:0}); markDirty(); renderCalc(); }
function delInvRow(i){ invStore().rows.splice(i,1); markDirty(); renderCalc(); }
function setInvNeeded(v){ invStore().cutsNeeded=+v||0; markDirty(); renderCalc(); }

function renderCalc(){
  const inv=invStore(), ad=isAdmin(), ro=ad?'':'disabled', D=S.config.defaults, Y=inv.yield;
  const over=(D.overagePct||70)/100;
  const cutF12=Math.ceil((roomOf('F1').slots||12)*(roomOf('F1').clonesPerSlot||90)*(1+over));
  const cutF3=Math.ceil((roomOf('F3').slots||12)*(roomOf('F3').clonesPerSlot||59)*(1+over));

  // totals
  let totMoms=0, totCuts=0, bySize={S:0,M:0,L:0};
  inv.rows.forEach(r=>{ const each=Y[r.size]||0; totMoms+=r.count; totCuts+=r.count*each; bySize[r.size]+=r.count; });
  const need=inv.cutsNeeded, gap=need-totCuts, enough=gap<=0;
  // how many more moms to cover the gap, by size
  const moreS=gap>0?Math.ceil(gap/(Y.S||1)):0, moreM=gap>0?Math.ceil(gap/(Y.M||1)):0, moreL=gap>0?Math.ceil(gap/(Y.L||1)):0;

  const rowsHtml=inv.rows.map((r,i)=>{
    const each=Y[r.size]||0, tot=r.count*each;
    const young=(r.age!==''&&r.age<4);
    return `<tr>
      <td>${ad?`<input value="${esc(r.label)}" placeholder="strain / tag" style="width:100%" onchange="setInvRow(${i},'label',this.value)">`:esc(r.label)||'<span class=faint>—</span>'}</td>
      <td style="text-align:center">${ad?`<input type="number" value="${r.age}" style="width:56px" onchange="setInvRow(${i},'age',this.value)">`:r.age}${young?' <span class="badge warn" title="young mom — may under-yield">young</span>':''}</td>
      <td style="text-align:center">${ad?`<select onchange="setInvRow(${i},'size',this.value)" style="padding:4px 6px"><option ${r.size==='S'?'selected':''}>S</option><option ${r.size==='M'?'selected':''}>M</option><option ${r.size==='L'?'selected':''}>L</option></select>`:r.size}</td>
      <td style="text-align:center">${ad?`<input type="number" value="${r.count}" style="width:64px" onchange="setInvRow(${i},'count',this.value)">`:r.count}</td>
      <td style="text-align:center" class="mono muted">${each}</td>
      <td style="text-align:center" class="mono" style="font-weight:700">${tot.toLocaleString()}</td>
      ${ad?`<td style="text-align:center"><button class="btn small" onclick="delInvRow(${i})">✕</button></td>`:''}
    </tr>`;
  }).join('');

  $('#main').innerHTML=`
  <div class="pagehead"><div><h2>Moms → Cuts</h2><div class="sub">Your mom inventory and the cuts it can make — cut-to-kill (each mom cut once). Set size yields, list your moms, and it tells you if you have enough.</div></div>
    <div class="hd-actions">${headerButtons()}</div></div>

  <div class="card" style="margin-bottom:14px">
    <h3>Cuts per mom, by size</h3>
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end">
      ${['S','M','L'].map(sz=>`<div><label class="small" style="display:block;color:var(--text-dim);margin-bottom:4px">${sz==='S'?'Small':sz==='M'?'Medium':'Large'} (${sz})</label><input type="number" value="${Y[sz]}" ${ro} onchange="setInvYield('${sz}',this.value)" style="width:90px;font-size:15px"></div>`).join('')}
      <div class="small faint" style="max-width:340px">Cuts one mom of each size gives before it's cut out. Tune these with Matt — they drive every total below.</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <h3>Mom inventory ${ad?'':'<span class="faint" style="text-transform:none">(view only)</span>'}</h3>
    <table class="tbl"><thead><tr><th>Strain / tag</th><th style="text-align:center">Age (wks)</th><th style="text-align:center">Size</th><th style="text-align:center"># Moms</th><th style="text-align:center">Cuts each</th><th style="text-align:center">Total cuts</th>${ad?'<th></th>':''}</tr></thead>
    <tbody>${rowsHtml||`<tr><td colspan="${ad?7:6}" class="empty">No moms listed yet.</td></tr>`}</tbody>
    <tfoot><tr style="border-top:2px solid var(--line)">
      <td style="font-weight:800;color:var(--text-bright)">TOTAL</td><td></td><td class="small faint" style="text-align:center">${bySize.S}S · ${bySize.M}M · ${bySize.L}L</td>
      <td style="text-align:center;font-weight:800;color:var(--text-bright)" class="mono">${totMoms}</td><td></td>
      <td style="text-align:center;font-weight:800;color:var(--teal)" class="mono">${totCuts.toLocaleString()}</td>${ad?'<td></td>':''}
    </tr></tfoot></table>
    ${ad?`<button class="btn small" style="margin-top:10px" onclick="addInvRow()">+ Add mom group</button>`:''}
  </div>

  <div class="grid2">
    <div class="card">
      <h3>Do we have enough?</h3>
      <label class="small" style="display:block;color:var(--text-dim);margin:6px 0 4px">Cuts needed</label>
      <input type="number" value="${need}" ${ro} onchange="setInvNeeded(this.value)" style="font-size:16px;width:150px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        ${ad?`<button class="btn small" onclick="setInvNeeded(${cutF12})">F1/F2 order · ${cutF12.toLocaleString()}</button>
        <button class="btn small" onclick="setInvNeeded(${cutF3})">F3 · ${cutF3.toLocaleString()}</button>
        <button class="btn small" onclick="setInvNeeded(${cutF12*2+cutF3})">All 3 rooms · ${(cutF12*2+cutF3).toLocaleString()}</button>`:''}
      </div>
      <div style="margin-top:16px;padding:14px;border-radius:8px;background:${enough?'#2ecc7112':'#e74c3c12'};border:1px solid ${enough?'#2ecc7144':'#e74c3c44'}">
        <div style="font-size:20px;font-weight:800;color:${enough?'var(--ok)':'var(--red)'}">${enough?`✓ Enough — ${(-gap).toLocaleString()} cuts to spare`:`✗ Short ${gap.toLocaleString()} cuts`}</div>
        ${enough?'':`<div class="small" style="margin-top:8px;color:var(--text)">Cover the gap with about:<br><b>${moreL}</b> more large moms &nbsp;·&nbsp; <b>${moreM}</b> medium &nbsp;·&nbsp; <b>${moreS}</b> small</div>`}
      </div>
    </div>
    <div class="card">
      <h3>At a glance</h3>
      <div class="small" style="line-height:1.7">
        Total moms on hand: <b style="color:var(--text-bright)">${totMoms}</b><br>
        Total cuts available: <b style="color:var(--teal)">${totCuts.toLocaleString()}</b> &nbsp;(cut-to-kill)<br>
        That's <b>${(totCuts/cutF12).toFixed(2)}</b> full F1/F2 orders' worth.<br><br>
        <span class="faint">This is the plain count. The <a href="javascript:nav('mom')">Mom Capacity</a> tab adds the timing — whether the mom room can physically hold enough moms at once when all three rooms cut on their real cadence.</span>
      </div>
    </div>
  </div>`;
}

</script>
</body>
</html>
